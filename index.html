<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SITEM - SEMGAS | Monitoreo UPB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/login.css">
</head>

<body class="light-mode">
  <div class="bg-grid"></div>
  <div class="particles" id="particles"></div>

  <main class="login-wrapper">
    <div class="login-card">

      <header class="login-header">
        <div class="logo-mark">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="18" stroke="var(--accent)" stroke-width="1.5" />
            <path d="M10 24 Q15 14 20 18 Q25 22 30 12" stroke="var(--accent)" stroke-width="2" fill="none"
              stroke-linecap="round" />
            <circle cx="20" cy="20" r="2.5" fill="var(--accent)" />
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-brand" style="font-size: 1.2rem; color: var(--text-main);">SITEM - SEMGAS</span>
        </div>
        <p class="logo-tagline">Monitoreo Ambiental UPB Montería</p>
      </header>

      <form class="login-form" id="loginForm" novalidate>
        <div class="field-group">
          <label for="username">Usuario</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 20 20" fill="none">
              <circle cx="10" cy="7" r="3.5" stroke="currentColor" stroke-width="1.5" />
              <path d="M3 17c0-3.314 3.134-6 7-6s7 2.686 7 6" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" />
            </svg>
            <input type="text" id="username" name="username" placeholder="Ingresa tu usuario" autocomplete="username"
              required />
          </div>
        </div>

        <div class="field-group">
          <label for="password">Contraseña</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 20 20" fill="none">
              <rect x="4" y="9" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.5" />
              <path d="M7 9V6.5a3 3 0 016 0V9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
            </svg>
            <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña"
              autocomplete="current-password" required />
            <button type="button" class="toggle-pwd" id="togglePwd" aria-label="Mostrar contraseña">
              <svg viewBox="0 0 20 20" fill="none" id="eyeIcon">
                <path d="M2 10s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z" stroke="currentColor" stroke-width="1.5" />
                <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5" />
              </svg>
            </button>
          </div>
        </div>

        <div class="error-msg" id="errorMsg" role="alert" aria-live="polite"></div>

        <button type="submit" class="btn-login" id="btnLogin">
          <span class="btn-text">Ingresar</span>
          <span class="btn-spinner" hidden>
            <svg viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2.5" stroke-dasharray="50"
                stroke-dashoffset="30" />
            </svg>
          </span>
        </button>
      </form>

      <footer class="login-footer">
        <span>UPB Montería · Escuela de Ingenierías y Arquitectura · v1.0</span>
      </footer>
    </div>
  </main>

  <script src="js/auth.js"></script>
</body>

</html>
