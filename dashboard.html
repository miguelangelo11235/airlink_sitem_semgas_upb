<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AirLink — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>

  <!-- ── Top Nav ─────────────────────────────────────────── -->
  <nav class="topnav">
    <div class="nav-left">
      <div class="nav-logo">
        <svg viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="14" stroke="var(--accent)" stroke-width="1.5"/>
          <path d="M8 19 Q12 11 16 14 Q20 17 24 9" stroke="var(--accent)" stroke-width="2" fill="none" stroke-linecap="round"/>
          <circle cx="16" cy="16" r="2" fill="var(--accent)"/>
        </svg>
        <span class="nav-brand">AIR<span class="nav-sub">LINK</span></span>
      </div>
    </div>
    <div class="nav-center">
      <div class="status-pill" id="statusPill">
        <span class="status-dot"></span>
        <span class="status-label" id="statusLabel">Conectando…</span>
      </div>
    </div>
    <div class="nav-right">
      <span class="nav-device" id="navDevice">—</span>
      <button class="btn-icon" id="btnDownload" title="Descargar CSV" aria-label="Descargar CSV">
        <svg viewBox="0 0 20 20" fill="none">
          <path d="M10 13l-4-4m4 4l4-4m-4 4V3m6 13a2 2 0 01-2 2H6a2 2 0 01-2-2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="btn-icon" id="btnRefresh" title="Actualizar datos" aria-label="Actualizar">
        <svg viewBox="0 0 20 20" fill="none">
          <path d="M16.5 9A6.5 6.5 0 103.9 13.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M3.5 17v-3.5H7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="btn-icon" id="btnLogout" title="Cerrar sesión" aria-label="Cerrar sesión">
        <svg viewBox="0 0 20 20" fill="none">
          <path d="M13 3h3a1 1 0 011 1v12a1 1 0 01-1 1h-3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M8 13l4-3-4-3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 10H3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- ── Main ────────────────────────────────────────────── -->
  <main class="main-content">

    <!-- Last reading summary cards -->
    <section class="summary-row" aria-label="Últimas lecturas">
      <div class="summary-card" id="cardTemp">
        <div class="card-icon card-icon--temp">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 3v10.26a4 4 0 101.5 0V3a1.5 1.5 0 00-3 0z" stroke="currentColor" stroke-width="1.6"/>
          </svg>
        </div>
        <div class="card-body">
          <span class="card-label">Temperatura</span>
          <span class="card-value" id="valTemp">—</span>
          <span class="card-unit">°C</span>
        </div>
      </div>
      <div class="summary-card" id="cardHum">
        <div class="card-icon card-icon--hum">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 3L6.5 10.5a5.5 5.5 0 1011 0L12 3z" stroke="currentColor" stroke-width="1.6"/>
          </svg>
        </div>
        <div class="card-body">
          <span class="card-label">Humedad</span>
          <span class="card-value" id="valHum">—</span>
          <span class="card-unit">%</span>
        </div>
      </div>
      <div class="summary-card" id="cardPm1">
        <div class="card-icon card-icon--pm">
          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/>
            <circle cx="6"  cy="8"  r="1.5" stroke="currentColor" stroke-width="1.4"/>
            <circle cx="18" cy="15" r="2"   stroke="currentColor" stroke-width="1.4"/>
            <circle cx="7"  cy="16" r="1"   stroke="currentColor" stroke-width="1.3"/>
            <circle cx="16" cy="6"  r="1.2" stroke="currentColor" stroke-width="1.3"/>
          </svg>
        </div>
        <div class="card-body">
          <span class="card-label">PM 1.0</span>
          <span class="card-value" id="valPm1">—</span>
          <span class="card-unit">µg/m³</span>
        </div>
      </div>
      <div class="summary-card" id="cardPm25">
        <div class="card-icon card-icon--pm25">
          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="4"   stroke="currentColor" stroke-width="1.6"/>
            <circle cx="5"  cy="8"  r="1.8" stroke="currentColor" stroke-width="1.4"/>
            <circle cx="19" cy="16" r="2.2" stroke="currentColor" stroke-width="1.4"/>
            <circle cx="6"  cy="17" r="1.2" stroke="currentColor" stroke-width="1.3"/>
          </svg>
        </div>
        <div class="card-body">
          <span class="card-label">PM 2.5</span>
          <span class="card-value" id="valPm25">—</span>
          <span class="card-unit">µg/m³</span>
        </div>
      </div>
      <div class="summary-card" id="cardPm10">
        <div class="card-icon card-icon--pm10">
          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="5"   stroke="currentColor" stroke-width="1.6"/>
            <circle cx="4"  cy="9"  r="2"   stroke="currentColor" stroke-width="1.4"/>
            <circle cx="20" cy="15" r="2.5" stroke="currentColor" stroke-width="1.4"/>
          </svg>
        </div>
        <div class="card-body">
          <span class="card-label">PM 10</span>
          <span class="card-value" id="valPm10">—</span>
          <span class="card-unit">µg/m³</span>
        </div>
      </div>
    </section>

    <!-- Range selector -->
    <div class="controls-row">
      <div class="time-tabs" role="tablist" aria-label="Rango de tiempo">
        <button class="tab-btn active" data-range="1h"  role="tab" aria-selected="true">1H</button>
        <button class="tab-btn"        data-range="6h"  role="tab">6H</button>
        <button class="tab-btn"        data-range="24h" role="tab">24H</button>
        <button class="tab-btn"        data-range="7d"  role="tab">7D</button>
      </div>
      <span class="last-updated" id="lastUpdated">Última actualización: —</span>
    </div>

    <!-- Charts -->
    <section class="charts-grid">
      <!-- PM Chart -->
      <div class="chart-card" id="pmChartCard">
        <div class="chart-header">
          <div>
            <h2 class="chart-title">Material Particulado</h2>
            <p class="chart-subtitle">PM1 · PM2.5 · PM10 &nbsp;/&nbsp; µg/m³</p>
          </div>
          <div class="chart-legend" id="pmLegend">
            <span class="legend-item"><span class="legend-dot" style="background:#00bcd4"></span>PM1</span>
            <span class="legend-item"><span class="legend-dot" style="background:#f9a825"></span>PM2.5</span>
            <span class="legend-item"><span class="legend-dot" style="background:#ef5350"></span>PM10</span>
          </div>
        </div>
        <div class="chart-area">
          <canvas id="pmChart" aria-label="Gráfica de material particulado"></canvas>
          <div class="chart-overlay" id="pmOverlay">
            <div class="spinner"></div>
          </div>
        </div>
      </div>

      <!-- Temp/Hum Chart -->
      <div class="chart-card" id="thChartCard">
        <div class="chart-header">
          <div>
            <h2 class="chart-title">Temperatura &amp; Humedad</h2>
            <p class="chart-subtitle">°C &nbsp;/&nbsp; % HR</p>
          </div>
          <div class="chart-legend" id="thLegend">
            <span class="legend-item"><span class="legend-dot" style="background:#ff7043"></span>Temperatura</span>
            <span class="legend-item"><span class="legend-dot" style="background:#42a5f5"></span>Humedad</span>
          </div>
        </div>
        <div class="chart-area">
          <canvas id="thChart" aria-label="Gráfica de temperatura y humedad"></canvas>
          <div class="chart-overlay" id="thOverlay">
            <div class="spinner"></div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- Chart.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <!-- chartjs-adapter-date-fns para eje de tiempo -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/date-fns/2.30.0/date_fns.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>

  <script src="js/api.js"></script>
  <script src="js/charts.js"></script>
</body>
</html>
